name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  SERVICE: ai-news-studio
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-news-studio/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          cat > cloud-run-service.yaml <<EOF
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: ${{ env.SERVICE }}
            annotations:
              run.googleapis.com/ingress: all
          spec:
            template:
              metadata:
                annotations:
                  autoscaling.knative.dev/minScale: "0"
                  autoscaling.knative.dev/maxScale: "1"
                  run.googleapis.com/execution-environment: gen2
                  run.googleapis.com/container-dependencies: '{"app":["voicevox"]}'
              spec:
                serviceAccountName: ${{ secrets.GCP_SERVICE_ACCOUNT }}
                containerConcurrency: 1
                timeoutSeconds: 1800
                containers:
                  - name: app
                    image: ${{ env.IMAGE }}:${{ github.sha }}
                    ports:
                      - name: http1
                        containerPort: 8080
                    env:
                      - name: APP_ENV
                        value: production
                      - name: STATIC_FILES_DIR
                        value: /workspace/frontend/dist
                      - name: VOICEVOX_BASE_URL
                        value: http://localhost:50021
                      - name: VOICEVOX_SPEAKER_ID
                        value: "3"
                      - name: BASIC_AUTH_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: basic-auth-username
                            key: latest
                      - name: BASIC_AUTH_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: basic-auth-password
                            key: latest
                    resources:
                      limits:
                        cpu: "2.0"
                        memory: 6Gi
                    volumeMounts:
                      - name: data
                        mountPath: /workspace/backend/data
                  - name: voicevox
                    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
                    resources:
                      limits:
                        cpu: "2.0"
                        memory: 2Gi
                    startupProbe:
                      httpGet:
                        path: /version
                        port: 50021
                      periodSeconds: 5
                      timeoutSeconds: 2
                      failureThreshold: 60
                volumes:
                  - name: data
                    csi:
                      driver: gcsfuse.run.googleapis.com
                      volumeAttributes:
                        bucketName: ${{ secrets.GCS_BUCKET }}
          EOF

          gcloud run services replace cloud-run-service.yaml \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed

          gcloud run services add-iam-policy-binding ${{ env.SERVICE }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --member allUsers \
            --role roles/run.invoker \
            --quiet
